name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native:
    name: Build native library (${{ matrix.os }} ${{ matrix.platform }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Linux
            runsOn: ubuntu-24.04
            platform: linux-x86_64
            artifactName: framework_lib_ffi_linux_x86_64
            artifactPath: target/release/libframework_lib_ffi.so
          - os: Linux
            runsOn: ubuntu-24.04-arm
            platform: linux-arm64
            artifactName: framework_lib_ffi_linux_arm64
            artifactPath: target/release/libframework_lib_ffi.so
          - os: Windows
            runsOn: windows-2022
            platform: windows-x86_64
            artifactName: framework_lib_ffi_windows_x86_64
            artifactPath: target/release/framework_lib_ffi.dll
          - os: Windows
            runsOn: windows-11-arm
            platform: windows-arm64
            artifactName: framework_lib_ffi_windows_arm64
            artifactPath: target/release/framework_lib_ffi.dll

    runs-on: ${{ matrix.runsOn }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target

      - name: Install with Cache Linux Framework dependencies (libudev-dev)
        uses: awalsh128/cache-apt-pkgs-action@v1
        if: runner.os == 'Linux'
        with:
          packages: libudev-dev
          version: ${{ runner.os }}-${{ runner.arch }}

      - name: Build release
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifactName }}
          path: |
            ${{ matrix.artifactPath }}
            csharp/NativeMethods.g.cs
          if-no-files-found: error

  lints:
    name: Lints
    runs-on: ubuntu-24.04
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target

      - name: Install with Cache Linux Framework dependencies (libudev-dev)
        uses: awalsh128/cache-apt-pkgs-action@v1
        if: runner.os == 'Linux'
        with:
          packages: libudev-dev
          version: ${{ runner.os }}-${{ runner.arch }}

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings
