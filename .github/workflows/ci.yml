name: CI

on:
  push:
  pull_request:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target
  
      - name: Install with Cache Linux Framework dependencies (libudev-dev)
        uses: awalsh128/cache-apt-pkgs-action@v1
        if: runner.os == 'Linux'
        with:
          packages: libudev-dev
          version: ${{ runner.os }}-${{ runner.arch }}

      - name: Build release
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_lib_ffi_linux
          path: |
            target/release/libframework_lib_ffi.so
            csharp/NativeMethods.g.cs

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target

      - name: Build release
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_lib_ffi_windows
          path: |
            target/release/framework_lib_ffi.dll
            target/release/framework_lib_ffi.dll.lib
            target/release/framework_lib_ffi.pdb
            csharp/NativeMethods.g.cs

  lints:
    name: Lints
    runs-on: ubuntu-24.04
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target
  
      - name: Install with Cache Linux Framework dependencies (libudev-dev)
        uses: awalsh128/cache-apt-pkgs-action@v1
        if: runner.os == 'Linux'
        with:
          packages: libudev-dev
          version: ${{ runner.os }}-${{ runner.arch }}

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings
