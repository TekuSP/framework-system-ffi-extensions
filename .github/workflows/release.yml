name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to release (for example v0.6.2)"
        required: true
      release_name:
        description: "Optional release title"
        required: false
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build-linux:
    name: Package Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev zip

      - name: Setup Rust toolchain
        run: rustup show

      - name: Build release
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Create Linux package
        run: |
          mkdir -p dist/linux
          cp target/release/libframework_dotnet_ffi.so dist/linux/
          cp csharp/NativeMethods.g.cs dist/linux/
          cp LICENSE.md dist/linux/
          cd dist/linux
          zip -r ../framework_dotnet_ffi_linux_x86_64.zip .

      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_dotnet_ffi_linux_release
          path: dist/framework_dotnet_ffi_linux_x86_64.zip

  build-windows:
    name: Package Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        run: rustup show

      - name: Build release
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Create Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\windows | Out-Null
          Copy-Item target\release\framework_dotnet_ffi.dll dist\windows\
          Copy-Item target\release\framework_dotnet_ffi.dll.lib dist\windows\
          Copy-Item target\release\framework_dotnet_ffi.pdb dist\windows\
          Copy-Item csharp\NativeMethods.g.cs dist\windows\
          Copy-Item LICENSE.md dist\windows\
          Compress-Archive -Path dist\windows\* -DestinationPath dist\framework_dotnet_ffi_windows_x86_64.zip -Force

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_dotnet_ffi_windows_release
          path: dist/framework_dotnet_ffi_windows_x86_64.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_name || inputs.tag_name) || github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          generate_release_notes: true
          files: |
            dist/framework_dotnet_ffi_linux_release/framework_dotnet_ffi_linux_x86_64.zip
            dist/framework_dotnet_ffi_windows_release/framework_dotnet_ffi_windows_x86_64.zip