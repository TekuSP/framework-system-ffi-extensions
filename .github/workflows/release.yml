name: Release

on:
  release:
    types: [published]

permissions:
  actions: write
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - id: metadata
        shell: bash
        run: |
          tag_name="${{ github.event.release.tag_name }}"
          version="${tag_name#v}"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build native library (${{ matrix.os }} ${{ matrix.platform }})
    needs: prepare-release
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Linux
            runsOn: ubuntu-24.04
            platform: linux-x86_64
            artifactName: framework_lib_ffi_linux_x86_64_build
            artifactPath: |
              target/release/libframework_lib_ffi.so
              csharp/NativeMethods.g.cs
          - os: Linux
            runsOn: ubuntu-24.04-arm
            platform: linux-arm64
            artifactName: framework_lib_ffi_linux_arm64_build
            artifactPath: |
              target/release/libframework_lib_ffi.so
              csharp/NativeMethods.g.cs
          - os: Windows
            runsOn: windows-2022
            platform: windows-x86_64
            artifactName: framework_lib_ffi_windows_x86_64_build
            artifactPath: |
              target/release/framework_lib_ffi.dll
              target/release/framework_lib_ffi.dll.lib
              target/release/framework_lib_ffi.pdb
              csharp/NativeMethods.g.cs
          - os: Windows
            runsOn: windows-11-arm
            platform: windows-arm64
            artifactName: framework_lib_ffi_windows_arm64_build
            artifactPath: |
              target/release/framework_lib_ffi.dll
              target/release/framework_lib_ffi.dll.lib
              target/release/framework_lib_ffi.pdb
              csharp/NativeMethods.g.cs

    runs-on: ${{ matrix.runsOn }}
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
      FRAMEWORK_LIB_FFI_RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target

      - name: Install with Cache Linux Framework dependencies (libudev-dev)
        uses: awalsh128/cache-apt-pkgs-action@v1
        if: runner.os == 'Linux'
        with:
          packages: libudev-dev
          version: ${{ runner.os }}-${{ runner.arch }}

      - name: Log release metadata
        shell: bash
        run: |
          echo "Publishing tag ${RELEASE_TAG}"
          echo "Resolved version ${RELEASE_VERSION}"
          echo "Passing FRAMEWORK_LIB_FFI_RELEASE_VERSION=${RELEASE_VERSION} to cargo build"

      - name: Build release
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

  package-artifacts:
    name: Upload packaged artifacts
    needs:
      - prepare-release
      - build-native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare packaged artifacts
        shell: bash
        run: |
          mkdir -p packaged-artifacts
          primary_artifact_dir="dist/framework_lib_ffi_linux_x86_64_build"
          copy_into_package() {
            local source_path="$1"
            local package_dir="$2"
            [[ -f "$source_path" ]] || { echo "Error: Missing expected asset $source_path"; exit 1; }
            cp "$source_path" "$package_dir/" || { echo "Error: Failed to copy $source_path into $package_dir"; exit 1; }
          }
          prepare_package() {
            local artifact_dir="$1"
            local package_name="$2"
            shift 2
            local package_dir="packaged-artifacts/$package_name"
            mkdir -p "$package_dir"
            cp -R "$artifact_dir/csharp" "$package_dir/" || { echo "Error: Failed to copy C# bindings from $artifact_dir"; exit 1; }
            cp LICENSE.txt README.md "$package_dir/" || { echo "Error: Failed to copy repository docs into $package_dir"; exit 1; }
            for source_path in "$@"; do
              copy_into_package "$source_path" "$package_dir"
            done
          }
          binding_ref="$primary_artifact_dir/csharp/NativeMethods.g.cs"
          [[ -f "$binding_ref" ]] || { echo "Error: NativeMethods.g.cs missing from linux-x86_64 artifact"; exit 1; }
          for binding_source in \
            "dist/framework_lib_ffi_linux_arm64_build/csharp/NativeMethods.g.cs:linux-arm64" \
            "dist/framework_lib_ffi_windows_x86_64_build/csharp/NativeMethods.g.cs:windows-x86_64" \
            "dist/framework_lib_ffi_windows_arm64_build/csharp/NativeMethods.g.cs:windows-arm64"
          do
            binding_path="${binding_source%%:*}"
            platform="${binding_source##*:}"
            [[ -f "$binding_path" ]] || { echo "Error: NativeMethods.g.cs missing from ${platform} artifact"; exit 1; }
            cmp "$binding_ref" "$binding_path" || { echo "Error: NativeMethods.g.cs differs between linux-x86_64 and ${platform} outputs"; exit 1; }
          done
          prepare_package \
            dist/framework_lib_ffi_linux_x86_64_build \
            framework_lib_ffi_linux_x86_64_release \
            dist/framework_lib_ffi_linux_x86_64_build/target/release/libframework_lib_ffi.so
          prepare_package \
            dist/framework_lib_ffi_linux_arm64_build \
            framework_lib_ffi_linux_arm64_release \
            dist/framework_lib_ffi_linux_arm64_build/target/release/libframework_lib_ffi.so
          prepare_package \
            dist/framework_lib_ffi_windows_x86_64_build \
            framework_lib_ffi_windows_x86_64_release \
            dist/framework_lib_ffi_windows_x86_64_build/target/release/framework_lib_ffi.dll \
            dist/framework_lib_ffi_windows_x86_64_build/target/release/framework_lib_ffi.dll.lib \
            dist/framework_lib_ffi_windows_x86_64_build/target/release/framework_lib_ffi.pdb
          prepare_package \
            dist/framework_lib_ffi_windows_arm64_build \
            framework_lib_ffi_windows_arm64_release \
            dist/framework_lib_ffi_windows_arm64_build/target/release/framework_lib_ffi.dll \
            dist/framework_lib_ffi_windows_arm64_build/target/release/framework_lib_ffi.dll.lib \
            dist/framework_lib_ffi_windows_arm64_build/target/release/framework_lib_ffi.pdb

      - name: Upload linux x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_lib_ffi_linux_x86_64_release
          path: packaged-artifacts/framework_lib_ffi_linux_x86_64_release
          if-no-files-found: error

      - name: Upload linux arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_lib_ffi_linux_arm64_release
          path: packaged-artifacts/framework_lib_ffi_linux_arm64_release
          if-no-files-found: error

      - name: Upload windows x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_lib_ffi_windows_x86_64_release
          path: packaged-artifacts/framework_lib_ffi_windows_x86_64_release
          if-no-files-found: error

      - name: Upload windows arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: framework_lib_ffi_windows_arm64_release
          path: packaged-artifacts/framework_lib_ffi_windows_arm64_release
          if-no-files-found: error

      - name: Delete intermediate build artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: framework_lib_ffi_*_build
