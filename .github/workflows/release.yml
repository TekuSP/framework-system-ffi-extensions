name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - id: metadata
        shell: bash
        run: |
          tag_name="${{ github.event.release.tag_name }}"
          version="${tag_name#v}"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build native library (${{ matrix.os }} ${{ matrix.platform }})
    needs: prepare-release
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Linux
            runsOn: ubuntu-24.04
            platform: linux-x86_64
            artifactName: framework_lib_ffi_linux_x86_64_release
            artifactPath: |
              target/release/libframework_lib_ffi.so
              csharp/NativeMethods.g.cs
          - os: Linux
            runsOn: ubuntu-24.04-arm
            platform: linux-arm64
            artifactName: framework_lib_ffi_linux_arm64_release
            artifactPath: |
              target/release/libframework_lib_ffi.so
              csharp/NativeMethods.g.cs
          - os: Windows
            runsOn: windows-2022
            platform: windows-x86_64
            artifactName: framework_lib_ffi_windows_x86_64_release
            artifactPath: |
              target/release/framework_lib_ffi.dll
              target/release/framework_lib_ffi.dll.lib
              target/release/framework_lib_ffi.pdb
              csharp/NativeMethods.g.cs
          - os: Windows
            runsOn: windows-11-arm
            platform: windows-arm64
            artifactName: framework_lib_ffi_windows_arm64_release
            artifactPath: |
              target/release/framework_lib_ffi.dll
              target/release/framework_lib_ffi.dll.lib
              target/release/framework_lib_ffi.pdb
              csharp/NativeMethods.g.cs

    runs-on: ${{ matrix.runsOn }}
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target

      - name: Install with Cache Linux Framework dependencies (libudev-dev)
        uses: awalsh128/cache-apt-pkgs-action@v1
        if: runner.os == 'Linux'
        with:
          packages: libudev-dev
          version: ${{ runner.os }}-${{ runner.arch }}

      - name: Log release metadata
        shell: bash
        run: |
          echo "Publishing tag ${RELEASE_TAG}"
          echo "Resolved version ${RELEASE_VERSION}"
          echo "Passing FRAMEWORK_LIB_FFI_RELEASE_VERSION=${RELEASE_VERSION} to cargo build"

      - name: Build release
        env:
          FRAMEWORK_LIB_FFI_RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

  publish:
    name: Upload release assets
    needs:
      - prepare-release
      - build-native
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare release asset names
        shell: bash
        run: |
          mkdir -p release-assets
          move_asset() {
            local source_path="$1"
            local asset_name="$2"
            [[ -f "$source_path" ]] || { echo "Error: Missing expected asset $source_path"; exit 1; }
            mv "$source_path" "release-assets/$asset_name" || { echo "Error: Failed to move $source_path to release-assets/$asset_name"; exit 1; }
          }
          binding_ref="dist/framework_lib_ffi_linux_x86_64_release/csharp/NativeMethods.g.cs"
          [[ -f "$binding_ref" ]] || { echo "Error: NativeMethods.g.cs missing from linux-x86_64 artifact"; exit 1; }
          for binding_source in \
            "dist/framework_lib_ffi_linux_arm64_release/csharp/NativeMethods.g.cs:linux-arm64" \
            "dist/framework_lib_ffi_windows_x86_64_release/csharp/NativeMethods.g.cs:windows-x86_64" \
            "dist/framework_lib_ffi_windows_arm64_release/csharp/NativeMethods.g.cs:windows-arm64"
          do
            binding_path="${binding_source%%:*}"
            platform="${binding_source##*:}"
            [[ -f "$binding_path" ]] || { echo "Error: NativeMethods.g.cs missing from ${platform} artifact"; exit 1; }
            cmp "$binding_ref" "$binding_path" || { echo "Error: NativeMethods.g.cs differs between linux-x86_64 and ${platform} outputs"; exit 1; }
          done
          for asset_move in \
            "dist/framework_lib_ffi_linux_x86_64_release/target/release/libframework_lib_ffi.so:framework_lib_ffi_linux_x86_64.so" \
            "dist/framework_lib_ffi_linux_arm64_release/target/release/libframework_lib_ffi.so:framework_lib_ffi_linux_arm64.so" \
            "dist/framework_lib_ffi_windows_x86_64_release/target/release/framework_lib_ffi.dll:framework_lib_ffi_windows_x86_64.dll" \
            "dist/framework_lib_ffi_windows_x86_64_release/target/release/framework_lib_ffi.dll.lib:framework_lib_ffi_windows_x86_64.dll.lib" \
            "dist/framework_lib_ffi_windows_x86_64_release/target/release/framework_lib_ffi.pdb:framework_lib_ffi_windows_x86_64.pdb" \
            "dist/framework_lib_ffi_windows_arm64_release/target/release/framework_lib_ffi.dll:framework_lib_ffi_windows_arm64.dll" \
            "dist/framework_lib_ffi_windows_arm64_release/target/release/framework_lib_ffi.dll.lib:framework_lib_ffi_windows_arm64.dll.lib" \
            "dist/framework_lib_ffi_windows_arm64_release/target/release/framework_lib_ffi.pdb:framework_lib_ffi_windows_arm64.pdb"
          do
            source_path="${asset_move%%:*}"
            asset_name="${asset_move##*:}"
            move_asset "$source_path" "$asset_name"
          done
          move_asset "$binding_ref" NativeMethods.g.cs

      - name: Upload assets to published release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0)
          ((${#files[@]} > 0)) || { echo "Error: No release assets were prepared for upload"; exit 1; }
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"
