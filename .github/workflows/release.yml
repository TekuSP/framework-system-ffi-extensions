name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - id: metadata
        shell: bash
        run: |
          tag_name="${{ github.event.release.tag_name }}"
          version="${tag_name#v}"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build native library (${{ matrix.os }} ${{ matrix.platform }})
    needs: prepare-release
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: Linux
            runsOn: ubuntu-24.04
            platform: linux-x86_64
            artifactName: framework_lib_ffi_linux_x86_64_release
            artifactPath: |
              target/release/libframework_lib_ffi.so
              csharp/NativeMethods.g.cs
          - os: Linux
            runsOn: ubuntu-24.04-arm
            platform: linux-arm64
            artifactName: framework_lib_ffi_linux_arm64_release
            artifactPath: |
              target/release/libframework_lib_ffi.so
              csharp/NativeMethods.g.cs
          - os: Windows
            runsOn: windows-2022
            platform: windows-x86_64
            artifactName: framework_lib_ffi_windows_x86_64_release
            artifactPath: |
              target/release/framework_lib_ffi.dll
              target/release/framework_lib_ffi.dll.lib
              target/release/framework_lib_ffi.pdb
              csharp/NativeMethods.g.cs
          - os: Windows
            runsOn: windows-11-arm
            platform: windows-arm64
            artifactName: framework_lib_ffi_windows_arm64_release
            artifactPath: |
              target/release/framework_lib_ffi.dll
              target/release/framework_lib_ffi.dll.lib
              target/release/framework_lib_ffi.pdb
              csharp/NativeMethods.g.cs

    runs-on: ${{ matrix.runsOn }}
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
      FRAMEWORK_LIB_FFI_RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust with Cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: |
            framework-system -> target

      - name: Install with Cache Linux Framework dependencies (libudev-dev)
        uses: awalsh128/cache-apt-pkgs-action@v1
        if: runner.os == 'Linux'
        with:
          packages: libudev-dev
          version: ${{ runner.os }}-${{ runner.arch }}

      - name: Log release metadata
        shell: bash
        run: |
          echo "Publishing tag ${RELEASE_TAG}"
          echo "Resolved version ${RELEASE_VERSION}"

      - name: Build release
        run: cargo build --release

      - name: Check generated bindings are up to date
        run: git diff --exit-code -- csharp/NativeMethods.g.cs

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

  publish:
    name: Upload release assets
    needs:
      - prepare-release
      - build-native
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare release asset names
        shell: bash
        run: |
          mkdir -p release-assets
          binding_ref="$(find dist/framework_lib_ffi_linux_x86_64_release -name NativeMethods.g.cs -print -quit)"
          linux_arm64_binding="$(find dist/framework_lib_ffi_linux_arm64_release -name NativeMethods.g.cs -print -quit)"
          windows_x86_64_binding="$(find dist/framework_lib_ffi_windows_x86_64_release -name NativeMethods.g.cs -print -quit)"
          windows_arm64_binding="$(find dist/framework_lib_ffi_windows_arm64_release -name NativeMethods.g.cs -print -quit)"
          cmp "$binding_ref" "$linux_arm64_binding" || (echo "Error: NativeMethods.g.cs differs between linux-x86_64 and linux-arm64 outputs" && exit 1)
          cmp "$binding_ref" "$windows_x86_64_binding" || (echo "Error: NativeMethods.g.cs differs between linux-x86_64 and windows-x86_64 outputs" && exit 1)
          cmp "$binding_ref" "$windows_arm64_binding" || (echo "Error: NativeMethods.g.cs differs between linux-x86_64 and windows-arm64 outputs" && exit 1)
          mv dist/framework_lib_ffi_linux_x86_64_release/libframework_lib_ffi.so release-assets/framework_lib_ffi_linux_x86_64.so
          mv dist/framework_lib_ffi_linux_arm64_release/libframework_lib_ffi.so release-assets/framework_lib_ffi_linux_arm64.so
          mv dist/framework_lib_ffi_windows_x86_64_release/framework_lib_ffi.dll release-assets/framework_lib_ffi_windows_x86_64.dll
          mv dist/framework_lib_ffi_windows_x86_64_release/framework_lib_ffi.dll.lib release-assets/framework_lib_ffi_windows_x86_64.dll.lib
          mv dist/framework_lib_ffi_windows_x86_64_release/framework_lib_ffi.pdb release-assets/framework_lib_ffi_windows_x86_64.pdb
          mv dist/framework_lib_ffi_windows_arm64_release/framework_lib_ffi.dll release-assets/framework_lib_ffi_windows_arm64.dll
          mv dist/framework_lib_ffi_windows_arm64_release/framework_lib_ffi.dll.lib release-assets/framework_lib_ffi_windows_arm64.dll.lib
          mv dist/framework_lib_ffi_windows_arm64_release/framework_lib_ffi.pdb release-assets/framework_lib_ffi_windows_arm64.pdb
          mv "$binding_ref" release-assets/NativeMethods.g.cs

      - name: Upload assets to published release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0)
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"
